<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog-Training: ТАК vs. ТАКОЙ</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #e5ddd5; /* WhatsApp-ähnlicher Hintergrund */
            --card-bg: #ffffff;
            --text-color: #333;
            --bubble-left: #ffffff;
            --bubble-right: #dcf8c6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1, h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .instructions {
            background: #e1f5fe;
            padding: 15px;
            border-left: 5px solid var(--secondary-color);
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* Chat-Design */
        .chat-container {
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .dialog-step {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 1.05rem;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .bubble-left {
            align-self: flex-start;
            background-color: var(--bubble-left);
            border-bottom-left-radius: 2px;
        }

        .bubble-right {
            align-self: flex-end;
            background-color: var(--bubble-right);
            border-bottom-right-radius: 2px;
        }

        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 5px;
        }

        .option-btn {
            background: white;
            border: 2px solid #ccc;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--secondary-color);
            background-color: #f0f7ff;
        }

        /* Feedback */
        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: var(--error-color) !important;
        }

        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }

        /* Footer */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button.main-action {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; }
        .btn-solve { background-color: var(--primary-color); }
        button.main-action:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            .bubble { font-size: 0.95rem; max-width: 90%; }
            .option-btn { font-size: 0.85rem; padding: 6px 10px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russische Grammatik</h1>
    <h2>Dialog-Training: Chatte auf Russisch</h2>

    <div class="instructions">
        <strong>Anleitung:</strong> Vervollständigen Sie die Chats. Wählen Sie für die Antwort die grammatikalisch korrekte Sprechblase aus.
        <br>Feedback erhalten Sie <strong>sofort</strong> nach dem Klicken (Grün = Richtig, Rot = Falsch).
    </div>

    <div id="chat-list" class="chat-container">
        <!-- Dialoge werden hier geladen -->
    </div>

    <div class="controls">
        <button class="main-action btn-reset" onclick="resetAll()">Zurücksetzen</button>
        <button class="main-action btn-solve" onclick="showAllSolutions()">Lösungen anzeigen</button>
    </div>
</div>

<script>
    const dialogs = [
        {
            id: 1,
            q: "Как тебе новый фильм?",
            options: ["Он ТАК интересный!", "Он ТАКОЙ интересный!"],
            correct: 1
        },
        {
            id: 2,
            q: "Ты пойдёшь гулять?",
            options: ["Нет, на улице ТАК холодно.", "Нет, на улице ТАКОЙ холодно."],
            correct: 0
        },
        {
            id: 3,
            q: "Посмотри на это платье!",
            options: ["Оно ТАК красивое!", "Оно ТАКОЕ красивое!"],
            correct: 1
        },
        {
            id: 4,
            q: "Твои дети уже в школе?",
            options: ["Да, они ТАК умны!", "Да, они ТАКИЕ умны!"],
            correct: 0
        },
        {
            id: 5,
            q: "Тебе нравится кофе?",
            options: ["Да, он ТАК вкусный!", "Да, он ТАКОЙ вкусный!"],
            correct: 1
        },
        {
            id: 6,
            q: "Слышал, как она поёт?",
            options: ["Да, она поёт ТАК красиво!", "Да, она поёт ТАКАЯ красиво!"],
            correct: 0
        },
        {
            id: 7,
            q: "Что ты думаешь о плане?",
            options: ["Это ТАК странная идея.", "Это ТАКАЯ странная идея."],
            correct: 1
        },
        {
            id: 8,
            q: "Как тебе Москва?",
            options: ["Это ТАКОЙ большой город!", "Это ТАК большой город!"],
            correct: 0
        },
        {
            id: 9,
            q: "Купим эти часы?",
            options: ["Нет, это ТАК дорого!", "Нет, это ТАКОЙ дорого!"],
            correct: 0
        },
        {
            id: 10,
            q: "Ты слышал новости?",
            options: ["Да, это ТАКИЕ хорошие новости!", "Да, это ТАК хорошие новости!"],
            correct: 0
        },
        {
            id: 11,
            q: "Поможешь мне с задачей?",
            options: ["Она ТАКАЯ трудна.", "Она ТАК трудна."],
            correct: 1
        },
        {
            id: 12,
            q: "Где живёт твой друг?",
            options: ["У него ТАКОЙ огромный дом!", "У него ТАК огромный дом!"],
            correct: 0
        },
        {
            id: 13,
            q: "Почему ты не читаешь?",
            options: ["В комнате ТАК темно.", "В комнате ТАКОЕ темно."],
            correct: 0
        },
        {
            id: 14,
            q: "Тебе нравится мой подарок?",
            options: ["Да, он ТАК дорогой!", "Да, он ТАКОЙ дорогой!"],
            correct: 1
        },
        {
            id: 15,
            q: "Твои соседи хорошие?",
            options: ["Да, они ТАКИЕ добрые люди.", "Да, они ТАК добрые люди."],
            correct: 0
        },
        {
            id: 16,
            q: "Как тебе яблоко?",
            options: ["Оно ТАК вкусно!", "Оно ТАКОЕ вкусно!"],
            correct: 0
        },
        {
            id: 17,
            q: "Ты видел её новую машину?",
            options: ["Да, она ТАК быстрая!", "Да, она ТАКАЯ быстрая!"],
            correct: 1
        },
        {
            id: 18,
            q: "Что скажешь о Мише?",
            options: ["Миша ТАК умён!", "Миша ТАКОЙ умён!"],
            correct: 0
        },
        {
            id: 19,
            q: "Трудный был экзамен?",
            options: ["Да, это ТАК сложный вопрос.", "Да, это ТАКОЙ сложный вопрос."],
            correct: 1
        },
        {
            id: 20,
            q: "Почему ты в пальто?",
            options: ["Сегодня ТАКОЙ холодный день.", "Сегодня ТАК холодный день."],
            correct: 0
        }
    ];

    function renderDialogs() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        
        dialogs.forEach(d => {
            const step = document.createElement('div');
            step.className = 'dialog-step';
            
            step.innerHTML = `
                <div class="bubble bubble-left">„${d.q}“</div>
                <div class="options-container" id="options-${d.id}">
                    ${d.options.map((opt, idx) => `
                        <button class="option-btn" onclick="checkChoice(${d.id}, ${idx})">${opt}</button>
                    `).join('')}
                </div>
            `;
            list.appendChild(step);
        });
    }

    window.checkChoice = function(id, choiceIdx) {
        const d = dialogs.find(item => item.id === id);
        const buttons = document.querySelectorAll(`#options-${id} .option-btn`);
        
        buttons.forEach(btn => btn.classList.add('disabled'));
        
        if (choiceIdx === d.correct) {
            buttons[choiceIdx].classList.add('correct');
        } else {
            buttons[choiceIdx].classList.add('wrong');
            buttons[d.correct].classList.add('correct');
        }
    }

    window.resetAll = function() {
        renderDialogs();
    }

    window.showAllSolutions = function() {
        dialogs.forEach(d => {
            const buttons = document.querySelectorAll(`#options-${d.id} .option-btn`);
            buttons.forEach(btn => btn.classList.add('disabled'));
            buttons[d.correct].classList.add('correct');
        });
    }

    // Start
    renderDialogs();
</script>

</body>
</html>
