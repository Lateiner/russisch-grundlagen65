<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wortendungs-Baukasten: ТАК...</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1, h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .instructions {
            background: #e1f5fe;
            padding: 20px;
            border-left: 6px solid var(--secondary-color);
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .exercise-item {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .sentence {
            font-size: 1.2rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .word-base {
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 2px solid #ccc;
            padding-right: 2px;
        }

        .ending-placeholder {
            font-weight: bold;
            color: var(--secondary-color);
            min-width: 40px;
            display: inline-block;
            border-bottom: 2px solid var(--secondary-color);
            text-align: center;
        }

        .ending-placeholder.correct {
            color: var(--success-color);
            border-bottom-color: var(--success-color);
        }

        .ending-placeholder.wrong {
            color: var(--error-color);
            border-bottom-color: var(--error-color);
        }

        /* Baukasten-Steine */
        .brick-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .brick {
            background-color: #fff;
            border: 2px solid #ddd;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .brick:hover {
            border-color: var(--secondary-color);
            background-color: #f0f7ff;
        }

        .brick.selected {
            background-color: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        button.action-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; }
        .btn-solve { background-color: var(--primary-color); }
        button.action-btn:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .sentence { font-size: 1rem; }
            .brick { padding: 4px 8px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russische Grammatik</h1>
    <h2>Wortendungs-Baukasten: ТАК...</h2>

    <div class="instructions">
        <strong>Anleitung:</strong> Vervollständigen Sie das Wort „ТАК...“ in den Sätzen. 
        Klicken Sie auf den passenden Baustein (die Endung), um die Lücke zu füllen.
        <br>Wählen Sie den Baustein <strong>[ (leer) ]</strong>, wenn das Wort ТАК keine Endung benötigt.
    </div>

    <div id="exercise-list">
        <!-- JS generiert die Aufgaben -->
    </div>

    <div class="controls">
        <button class="action-btn btn-reset" onclick="resetAll()">Zurücksetzen</button>
        <button class="action-btn btn-solve" onclick="showAllSolutions()">Lösungen anzeigen</button>
    </div>
</div>

<script>
    const exercises = [
        { id: 1, text: ["Сегодня на улице", "холодно."], options: ["(leer)", "ОЙ", "АЯ"], answer: "(leer)" },
        { id: 2, text: ["Это", "интересный фильм."], options: ["ОЙ", "АЯ", "ОЕ", "ИЕ"], answer: "ОЙ" },
        { id: 3, text: ["У неё", "красивая сумка."], options: ["ОЙ", "АЯ", "ОЕ", "ИЕ"], answer: "АЯ" },
        { id: 4, text: ["Это", "вкусное яблоко."], options: ["ОЙ", "АЯ", "ОЕ", "ИЕ"], answer: "ОЕ" },
        { id: 5, text: ["Твои идеи", "умные!"], options: ["ОЙ", "АЯ", "ОЕ", "ИЕ"], answer: "ИЕ" },
        { id: 6, text: ["Миша", "умён."], options: ["(leer)", "ОЙ", "АЯ"], answer: "(leer)" },
        { id: 7, text: ["Я купил", "дорогую машину."], options: ["АЯ", "УЮ", "ОЙ", "ИЕ"], answer: "УЮ" },
        { id: 8, text: ["Мы видели", "красивого человека."], options: ["ОЙ", "ОГО", "ОМУ", "ИМ"], answer: "ОГО" },
        { id: 9, text: ["Она поёт", "громко."], options: ["(leer)", "ОЙ", "АЯ"], answer: "(leer)" },
        { id: 10, text: ["Это", "старое здание."], options: ["ОЙ", "АЯ", "ОЕ", "ИЕ"], answer: "ОЕ" },
        { id: 11, text: ["Я не хочу", "дорогого телефона."], options: ["ОЙ", "ОГО", "ОМУ", "ИМ"], answer: "ОГО" },
        { id: 12, text: ["Почему ты", "грустная?"], options: ["(leer)", "ОЙ", "АЯ", "ИЕ"], answer: "АЯ" },
        { id: 13, text: ["С", "хорошим другом не скучно."], options: ["ОЙ", "ОГО", "ОМУ", "ИМ"], answer: "ИМ" },
        { id: 14, text: ["В", "большом городе много машин."], options: ["ОЙ", "ОГО", "ОМ", "ИМ"], answer: "ОМ" },
        { id: 15, text: ["Маша", "красива."], options: ["(leer)", "ОЙ", "АЯ"], answer: "(leer)" },
        { id: 16, text: ["Я рад", "хорошим новостям."], options: ["ИМ", "ИМИ", "ИХ", "ИЕ"], answer: "ИМ" },
        { id: 17, text: ["Это были", "трудные задачи."], options: ["ОЙ", "АЯ", "ОЕ", "ИЕ"], answer: "ИЕ" },
        { id: 18, text: ["Мы говорили о", "странной ситуации."], options: ["ОЙ", "АЯ", "УЮ", "ОЕ"], answer: "ОЙ" },
        { id: 19, text: ["Посмотри на", "высокое дерево!"], options: ["ОЙ", "АЯ", "ОЕ", "ИЕ"], answer: "ОЕ" },
        { id: 20, text: ["Он", "много работает."], options: ["(leer)", "ОЙ", "АЯ"], answer: "(leer)" }
    ];

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = '';
        
        exercises.forEach((ex, idx) => {
            const item = document.createElement('div');
            item.className = 'exercise-item';
            
            item.innerHTML = `
                <div class="sentence">
                    <strong>${idx + 1}.</strong> ${ex.text[0]} 
                    <span class="word-base">ТАК</span><span id="placeholder-${ex.id}" class="ending-placeholder">...</span> 
                    ${ex.text[1]}
                </div>
                <div class="brick-container" id="bricks-${ex.id}">
                    ${ex.options.map(opt => `
                        <div class="brick" onclick="selectBrick(${ex.id}, '${opt}', this)">${opt}</div>
                    `).join('')}
                </div>
            `;
            list.appendChild(item);
        });
    }

    window.selectBrick = function(exId, val, brickEl) {
        const ex = exercises.find(e => e.id === exId);
        const placeholder = document.getElementById(`placeholder-${exId}`);
        const bricks = document.querySelectorAll(`#bricks-${exId} .brick`);
        
        // UI zurücksetzen
        bricks.forEach(b => b.classList.remove('selected'));
        brickEl.classList.add('selected');
        
        // Text setzen (bei leer nichts anzeigen)
        placeholder.innerText = (val === "(leer)") ? "" : val;
        
        // Feedback
        if (val === ex.answer) {
            placeholder.className = "ending-placeholder correct";
        } else {
            placeholder.className = "ending-placeholder wrong";
        }
    };

    window.resetAll = function() {
        renderExercises();
    };

    window.showAllSolutions = function() {
        exercises.forEach(ex => {
            const placeholder = document.getElementById(`placeholder-${ex.id}`);
            const bricks = document.querySelectorAll(`#bricks-${ex.id} .brick`);
            
            placeholder.innerText = (ex.answer === "(leer)") ? "" : ex.answer;
            placeholder.className = "ending-placeholder correct";
            
            bricks.forEach(b => {
                if (b.innerText === ex.answer) b.classList.add('selected');
                else b.classList.remove('selected');
            });
        });
    };

    // Initialisierung
    renderExercises();
</script>

</body>
</html>
